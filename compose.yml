services:
  postgres:
    image: postgres:16
    container_name: academy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: job_roles_db
      POSTGRES_USER: academy_user
      POSTGRES_PASSWORD: academy_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academy_user -d job_roles_db"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres_data: